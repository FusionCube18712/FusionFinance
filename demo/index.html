  <style>
    :root{--bg:#0c0e0d;--surface:#121513;--line:#282d29;--ink:#f0f2ef;--muted:#929a94;--accent:#62b88a;--warn:#d1a766;--bad:#c77a70;--mono:"SFMono-Regular",Consolas,monospace;--sans:Geist,"Avenir Next",Arial,sans-serif}
    *{box-sizing:border-box}html{background:var(--bg);color:var(--ink);font-family:var(--sans);color-scheme:dark}body{margin:0;min-height:100dvh;background:radial-gradient(900px 540px at 92% -10%,#173124 0,transparent 62%)}
    a{color:#a9d9bd;text-underline-offset:3px}a:hover{color:#d5efdf}a:focus-visible,button:focus-visible,input:focus-visible,.tableWrap:focus-visible{outline:2px solid var(--accent);outline-offset:3px}
    button,input{font:inherit}.shell{width:min(1480px,100%);margin:auto;padding:24px clamp(16px,3vw,48px) 56px}.top{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(280px,.5fr);gap:32px;align-items:end;padding:18px 0 28px;border-bottom:1px solid var(--line)}
    .eyebrow,.label{font:600 11px/1.2 var(--mono);letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}h1{margin:8px 0 6px;font-size:clamp(38px,5vw,72px);line-height:.95;letter-spacing:-.055em;font-weight:650}.thesis{max-width:760px;color:#c4cac5;font-size:clamp(16px,2vw,21px);line-height:1.45;margin:0}.status{border-left:1px solid var(--line);padding-left:24px}.status strong{display:block;margin-top:8px;color:var(--warn);font-size:15px}.status p{color:var(--muted);font-size:13px;line-height:1.5;margin:8px 0 0}
    .control{display:grid;grid-template-columns:auto minmax(0,1fr) auto;gap:14px;align-items:center;padding:18px 0}.control button{min-height:44px;border:1px solid #426c55;background:#183024;color:#dcf6e7;border-radius:8px;padding:9px 16px;cursor:pointer;transition:transform .2s cubic-bezier(.16,1,.3,1),background .2s cubic-bezier(.16,1,.3,1)}.control button:hover{background:#1d392a}.control button:active{transform:translateY(1px)}input[type=range]{accent-color:var(--accent);width:100%;min-width:0}.date{font:13px var(--mono);color:var(--muted);min-width:92px;text-align:right}
    .layout{display:grid;grid-template-columns:minmax(0,1.65fr) minmax(300px,.65fr);gap:28px}.plotWrap{border-top:1px solid var(--line);padding-top:16px}.plotHead{display:flex;justify-content:space-between;gap:24px;align-items:end}.plotHead h2{font-size:25px;letter-spacing:-.03em;margin:5px 0}.legend{display:flex;gap:16px;flex-wrap:wrap;font:12px var(--mono);color:var(--muted)}.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}canvas{display:block;width:100%;height:350px;margin-top:12px;background:linear-gradient(180deg,rgba(255,255,255,.014),transparent);border-bottom:1px solid var(--line)}
    .side{border-top:1px solid var(--line);padding-top:16px}.side h2{font-size:24px;letter-spacing:-.025em;margin:18px 0 0}.deviceNote{color:var(--muted);font:12px/1.5 var(--mono);margin:9px 0 0}.amdGrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:18px}.datum{padding:12px 0;border-bottom:1px solid var(--line);min-width:0}.datum b{display:block;font:600 15px var(--mono);margin-top:5px;overflow-wrap:anywhere}.receipt{color:var(--accent)}
    .tableWrap{width:100%;overflow-x:auto;margin-top:28px;scrollbar-color:#426c55 var(--surface);overscroll-behavior-inline:contain}.metrics{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums}.metrics caption{text-align:left;padding:0 0 10px;color:var(--muted);font:11px/1.45 var(--mono)}.metrics th,.metrics td{text-align:right;padding:13px 10px;border-bottom:1px solid var(--line);font:13px var(--mono);white-space:nowrap}.metrics th{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}.metrics th:first-child,.metrics td:first-child{text-align:left;padding-left:0}.metrics tr[data-arm=fusion] td{color:#bde4cd}.na{color:#929a94!important}
    .lower{display:grid;grid-template-columns:minmax(0,1.3fr) minmax(320px,.7fr);gap:28px;margin-top:34px}.section{border-top:1px solid var(--line);padding-top:16px}.section h2{font-size:20px;margin:5px 0 18px}.event{display:grid;grid-template-columns:120px 76px 1fr auto;gap:14px;padding:14px 0;border-bottom:1px solid var(--line);align-items:start}.event time,.event .asset{font:12px var(--mono);color:var(--muted)}.event .asset{color:var(--ink);font-weight:700}.event p{margin:0;font-size:13px;line-height:1.45;color:#bcc2bd}.event .result{font:11px var(--mono);color:var(--bad);text-transform:uppercase}.pipeline{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.stage{min-height:74px;padding:12px;border:1px solid var(--line);border-radius:8px;color:var(--muted);font:11px/1.35 var(--mono);text-transform:uppercase}.stage.active{border-color:#4b8766;color:#d9f0e2;background:#14251b}.limits{margin-top:22px;color:var(--muted);font-size:13px;line-height:1.55}.limits li{margin:8px 0}.loading,.error{padding:80px 20px;text-align:center;color:var(--muted)}.error{color:var(--bad)}
    footer{display:flex;justify-content:space-between;gap:20px;align-items:center;margin-top:36px;padding-top:18px;border-top:1px solid var(--line);color:var(--muted);font:12px/1.5 var(--mono)}
    @media(max-width:900px){.top,.layout,.lower{grid-template-columns:1fr}.status{border-left:0;border-top:1px solid var(--line);padding:18px 0 0}.metrics{min-width:700px}.event{grid-template-columns:80px 58px 1fr}.event .result{grid-column:3}.pipeline{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:600px){.shell{padding:18px 12px 40px}.top{gap:22px;padding-top:10px}.control{grid-template-columns:auto minmax(0,1fr);gap:12px}.date{grid-column:2;min-width:0;text-align:left}.plotHead{display:grid;gap:10px;align-items:start}.plotHead h2{max-width:18ch;font-size:23px;line-height:1.08}.legend{gap:9px 13px}.side h2{font-size:22px}.event{grid-template-columns:86px 1fr;gap:7px 12px}.event p,.event .result{grid-column:1/-1}.event .result{justify-self:start}.pipeline{grid-template-columns:repeat(2,minmax(0,1fr))}.stage{min-height:64px}footer{display:grid;gap:8px}}
    @media(prefers-reduced-motion:reduce){*{scroll-behavior:auto!important;transition:none!important}}
  </style>
</head>
<body><main class="shell" id="app"><div class="loading" role="status" aria-live="polite">Loading reproducible replay…</div></main><noscript><p class="error">FusionFinance needs JavaScript to render the replay.</p></noscript>
<script>
const COLORS={pure_ml:'#aab4ad',pure_llm:'#d1a766',fusion:'#62b88a',benchmark:'#68736c'};
const ARM_ORDER=['pure_ml','pure_llm','fusion','benchmark'];
const DRAW_ORDER=['benchmark','pure_ml','pure_llm','fusion'];
const fmtPct=v=>v==null?'—':`${v>=0?'+':''}${(v*100).toFixed(1)}%`;
const fmtNum=v=>v==null?'—':`${v>=0?'+':''}${v.toFixed(2)}`;
const money=v=>`$${Math.round(v).toLocaleString('en-US')}`;
function el(tag,cls,text){const n=document.createElement(tag);if(cls)n.className=cls;if(text!=null)n.textContent=text;return n}
function draw(canvas,data,index,domain){const dpr=devicePixelRatio||1,w=canvas.clientWidth,h=canvas.clientHeight;canvas.width=w*dpr;canvas.height=h*dpr;const c=canvas.getContext('2d');c.scale(dpr,dpr);c.clearRect(0,0,w,h);const pad={l:54,r:18,t:20,b:32};const X=i=>pad.l+(w-pad.l-pad.r)*i/Math.max(1,data.dates.length-1);const Y=v=>pad.t+(h-pad.t-pad.b)*(domain.hi-v)/(domain.hi-domain.lo);c.font='11px monospace';c.fillStyle='#858d87';c.strokeStyle='#282d29';c.lineWidth=1;for(let j=0;j<4;j++){const v=domain.lo+(domain.hi-domain.lo)*j/3,y=Y(v);c.beginPath();c.moveTo(pad.l,y);c.lineTo(w-pad.r,y);c.stroke();c.fillText(money(v),2,y+4)}for(const key of DRAW_ORDER){const a=data.arms[key];if(!a)continue;c.beginPath();c.strokeStyle=COLORS[key];c.lineWidth=key==='fusion'?2.8:1.6;c.setLineDash(key==='benchmark'?[5,5]:[]);for(let i=0;i<=index;i++){const x=X(i),y=Y(a.equity[i]);i?c.lineTo(x,y):c.moveTo(x,y)}c.stroke()}c.setLineDash([]);const markerX=X(index);c.strokeStyle='#3b433e';c.beginPath();c.moveTo(markerX,pad.t);c.lineTo(markerX,h-pad.b);c.stroke();c.fillStyle='#858d87';c.fillText(data.dates[0],pad.l,h-8);const finalDate=data.dates.at(-1);c.fillText(finalDate,w-pad.r-c.measureText(finalDate).width,h-8)}
function build(data){const app=document.getElementById('app');app.textContent='';const values=Object.values(data.arms).flatMap(a=>a.equity);const rawLo=Math.min(...values),rawHi=Math.max(...values),span=rawHi-rawLo||1;const chartDomain=Object.freeze({lo:rawLo-span*.1,hi:rawHi+span*.1});const top=el('header','top');const intro=el('div');intro.append(el('div','eyebrow','AMD Developer Hackathon · Open Innovation'),el('h1',null,'FusionFinance'),el('p','thesis','Quantitative models propose with numerical discipline. Agent analysts investigate context. Independent evidence and risk gates decide whether capital moves.'));const status=el('div','status');status.append(el('div','label','Evidence status'),el('strong',null,'Provisional replay — limitations visible'),el('p',null,'This artifact is retrospective and its legacy arms did not share the new execution kernel. Results are provisional, not causal proof, until every arm is rerun through that kernel.'));top.append(intro,status);app.append(top);
const controls=el('div','control');const btn=el('button',null,'Pause');btn.type='button';const slider=el('input');slider.type='range';slider.min=0;slider.max=data.dates.length-1;slider.value=0;slider.setAttribute('aria-label','Replay date');const date=el('time','date',data.dates[0]);date.dateTime=data.dates[0];date.setAttribute('aria-live','polite');controls.append(btn,slider,date);app.append(controls);
const layout=el('div','layout');const chart=el('section','plotWrap');const head=el('div','plotHead');const hh=el('div');hh.append(el('div','label','Synchronized account value'),el('h2',null,'$10,000 · same historical window'));const legend=el('div','legend');for(const k of ARM_ORDER){const a=data.arms[k];if(!a)continue;const item=el('span');const dot=el('i','dot');dot.style.background=COLORS[k];dot.setAttribute('aria-hidden','true');item.append(dot,document.createTextNode(a.label));legend.append(item)}head.append(hh,legend);const canvas=el('canvas');canvas.setAttribute('role','img');chart.append(head,canvas);
const side=el('aside','side');side.append(el('div','label','AMD compute usage'),el('h2',null,'ROCm-accelerated research'),el('p','deviceNote',data.amd_compute.device_claim));const ag=el('div','amdGrid');for(const [k,v] of [['Runtime',data.amd_compute.runtime],['VRAM',`${(data.amd_compute.vram_bytes/1e9).toFixed(1)} GB`],['Workload',data.amd_compute.workload],['Train time',`${data.amd_compute.training_seconds}s`],['Model retrains',data.amd_compute.requests_processed],['Receipt','SHA-256 verified']]){const d=el('div','datum');d.append(el('span','label',k),el('b',v==='SHA-256 verified'?'receipt':'',String(v??'Unavailable')));ag.append(d)}side.append(ag);layout.append(chart,side);app.append(layout);
const table=el('table','metrics');table.append(el('caption',null,'Legacy replay metrics · unavailable trade ledgers are shown as an em dash.'));const tr=el('tr');['System','Return','Sharpe','Sortino','Max DD','Volatility','Turnover','Costs','Trades'].forEach(x=>{const th=el('th',null,x);th.scope='col';tr.append(th)});const thead=el('thead');thead.append(tr);table.append(thead);const tb=el('tbody');for(const k of ARM_ORDER){const a=data.arms[k];if(!a)continue;const r=el('tr');r.dataset.arm=k;const m=a.metrics;[a.label,fmtPct(m.cumulative_return),fmtNum(m.sharpe),fmtNum(m.sortino),fmtPct(m.max_drawdown),fmtPct(m.annualized_volatility),m.turnover==null?'—':fmtPct(m.turnover),m.transaction_costs==null?'—':money(m.transaction_costs),m.trade_count==null?'—':m.trade_count].forEach((x,i)=>{const cell=el(i?'td':'th',x==='—'?'na':'',String(x));if(!i)cell.scope='row';r.append(cell)});tb.append(r)}table.append(tb);const tableWrap=el('div','tableWrap');tableWrap.tabIndex=0;tableWrap.setAttribute('role','region');tableWrap.setAttribute('aria-label','Performance metrics; scroll horizontally on small screens');tableWrap.append(table);app.append(tableWrap);
const lower=el('div','lower');const timeline=el('section','section');timeline.append(el('div','label','Decision timeline'),el('h2',null,'Every rejection remains inspectable'));const events=el('div');timeline.append(events);const arch=el('section','section');arch.append(el('div','label','Architecture guide'),el('h2',null,'Defined roles, explicit gates'));const pipe=el('div','pipeline');data.architecture.forEach((s,i)=>{const n=el('div','stage',`${String(i+1).padStart(2,'0')} · ${s}`);n.dataset.index=i;pipe.append(n)});arch.append(pipe);const ul=el('ul','limits');data.limitations.forEach(x=>ul.append(el('li',null,x)));arch.append(ul);lower.append(timeline,arch);app.append(lower);const footer=el('footer');const source=el('a',null,'View source on GitHub');source.href='https://github.com/FusionCube18712/FusionFinance';source.target='_blank';source.rel='noreferrer';footer.append(source,el('span',null,'Research demonstration · not investment advice'));app.append(footer);
function update(i){i=Number(i);const currentDate=data.dates[i];date.textContent=currentDate;date.dateTime=currentDate;slider.setAttribute('aria-valuetext',currentDate);draw(canvas,data,i,chartDomain);const valuesAtDate=ARM_ORDER.filter(k=>data.arms[k]).map(k=>`${data.arms[k].label} ${money(data.arms[k].equity[i])}`).join(', ');canvas.setAttribute('aria-label',`Portfolio comparison through ${currentDate}: ${valuesAtDate}.`);const cutoff=new Date(currentDate+'T23:59:59Z');events.textContent='';const shown=data.decisions.filter(x=>new Date(x.timestamp)<=cutoff).slice(-4).reverse();if(!shown.length)events.append(el('p','limits','No decisions at this point in the replay.'));for(const x of shown){const row=el('article','event');const eventTime=el('time',null,x.timestamp.slice(0,10));eventTime.dateTime=x.timestamp;row.append(eventTime,el('div','asset',x.asset),el('p',null,`${x.proposed_action.toUpperCase()} proposed · ${x.rationale} · ${x.risk_constraints.join('; ')}`),el('div','result',x.final_action));events.append(row)}const active=Math.floor(i/Math.max(1,data.dates.length-1)*Math.max(0,data.architecture.length-1));pipe.querySelectorAll('.stage').forEach((x,j)=>{x.classList.toggle('active',j===active);if(j===active)x.setAttribute('aria-current','step');else x.removeAttribute('aria-current')})}
const reduceMotion=matchMedia('(prefers-reduced-motion: reduce)').matches;let playing=!reduceMotion,last=performance.now();function syncButton(){btn.textContent=playing?'Pause':'Play';btn.setAttribute('aria-label',playing?'Pause replay':'Play replay')}function tick(now){if(playing&&!document.hidden&&now-last>90){slider.value=(Number(slider.value)+1)%(data.dates.length);update(slider.value);last=now}requestAnimationFrame(tick)}btn.addEventListener('click',()=>{playing=!playing;syncButton()});slider.addEventListener('input',()=>update(slider.value));addEventListener('resize',()=>update(slider.value));syncButton();update(0);requestAnimationFrame(tick)}
function validate(data){if(!data||!Array.isArray(data.dates)||data.dates.length<2)throw new Error('invalid dates');for(const key of ARM_ORDER){const arm=data.arms?.[key];if(!arm||!Array.isArray(arm.equity)||arm.equity.length!==data.dates.length)throw new Error(`invalid ${key} series`)}if(!Array.isArray(data.decisions)||!Array.isArray(data.architecture)||!Array.isArray(data.limitations))throw new Error('invalid replay metadata');return data}
fetch('replay.json',{cache:'no-store'}).then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}).then(validate).then(build).catch(()=>{const app=document.getElementById('app');app.textContent='';const message=el('div','error','Replay data could not be loaded. Please refresh the page.');message.setAttribute('role','alert');app.append(message)});
</script></body></html>
